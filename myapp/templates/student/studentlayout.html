<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css"
        integrity="sha512-t7Few9xlddEmgd3oKZQahkNI4dS6l80+eGEzFQiqtyVYdvcSG2D3Iub77R20BdotfRPA9caaRkg1tyaJiPmO0g=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        body {
            overflow: hidden;
        }

        .h {
            height: 100vh;
            overflow-y: auto;
        }

        .h:first-child {
            background: linear-gradient(180deg, #0b3f49, #10666a, #18b9aa);
            box-shadow: 5px 0 10px rgba(0, 0, 0, .3);
        }

        .main-content {
            height: 100vh;
            overflow-y: auto;
            background: #f8fafc;
        }

        #heading {
            background: #f0e76f;
            padding: 8px;
            text-align: center;
            font-weight: bold;
            border-radius: 6px;
            margin: 15px;
        }

        .menu {
            padding: 12px;
            border-radius: 8px;
            margin: 8px 15px;
            transition: .3s;
        }

        .menu:hover {
            background: #22c55e;
            transform: translateX(5px);
        }

        .menu a {
            text-decoration: none;
            color: black;
            font-weight: bold;
        }

        .h6-menu {
            color: #BBF7D0;
            margin-top: 20px;
        }
        
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-sm-2 h">
                <h4 class="text-white text-center"><i class="bi bi-leaf-fill"></i> Biotech Park</h4>

                <hr class="text-white mt-0">
                
                <p class="fw-bold text-center w-100 rounded-2 p-2" style="      background: #f0e76f ;"><a href="{% url 'studentdash' %}" style="margin-top: 20px;">🏠
                    Student Dashboard</a>
                </p>

                <div class="text-center text-white mb-3">
                    <i class="bi bi-person-circle fs-1"></i>
                    <h6 class="mt-2">{{ student.name }}</h6>
                    <small>{{ student.emailaddress }}</small>
                </div>

                <hr class="text-white">


                <h6 class="h6-menu">ADMISSION</h6>

                <p id="heading">Student Menu</p>

                <p class="menu">
                    <a href="{% url 'apply1' %}">
                        <i class="bi bi-pencil-square"></i>
                        Personal Information
                    </a>
                </p>

                <p class="menu">
                    <a href="{% url 'apply2' %}">
                        <i class="bi bi-file-earmark-check"></i>
                        Educational Information
                    </a>
                </p>

                <p class="menu">
                    <a href="#">
                        <i class="bi bi-cash-stack"></i>
                        Fee Payment
                    </a>
                </p>

                <p class="menu">
                    <a href="#">
                        <i class="bi bi-book"></i>
                        Enrolled Course
                    </a>
                </p>

                <p class="menu">
                    <a href="#">
                        <i class="bi bi-award"></i>
                        Admission Status
                    </a>
                </p>

                <p class="menu" style="border:1px solid gray;background:rgba(211,211,211,.25);">
                    <a href="{% url 'studentlogout' %}">
                        <i class="bi bi-box-arrow-left"></i>
                        Logout
                    </a>
                </p>

            </div>

            <div class="col-sm-10 main-content">
                {% block student %}
                {% endblock %}
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
