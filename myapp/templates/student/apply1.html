{% extends 'student/studentlayout.html' %}
{% block student %}

<form method="POST" class="mt-3 card shadow rounded-2">
    {% csrf_token %}

    <div class="container">

        <h1 class="fw-bold mt-3">Apply Now</h1>

        <!-- First Row -->
        <div class="row">
            <div class="col-sm-4 mt-3">
                <p>Enter Name</p>
                <input type="text" class="form-control" name="name">
            </div>

            <div class="col-sm-4 mt-3">
                <p>Enter Email</p>
                <input type="email" class="form-control" name="emailaddress">
            </div>

            <div class="col-sm-4 mt-3">
                <p>Contact No</p>
                <input type="number" class="form-control" name="contact_no">
            </div>
        </div>

        <!-- Second Row -->
        <div class="row">
            <div class="col-sm-6 mt-3">
                <p>Father's Name</p>
                <input type="text" class="form-control" name="f_name">
            </div>

            <div class="col-sm-6 mt-3">
                <p>Mother's Name</p>
                <input type="text" class="form-control" name="m_name">
            </div>
        </div>

        <!-- Third Row -->
        <div class="row">
            <div class="col-sm-12 mt-3">
                <p>Address</p>
                <textarea class="form-control" rows="3" name="address"></textarea>
            </div>
        </div>

        <!-- Fourth Row -->
        <div class="row">
            <div class="col-sm-6 mt-3">
                <p>Aadhaar Number</p>
                <input type="text" class="form-control" maxlength="12" name="aadhaar_no">
            </div>

            <div class="col-sm-6 mt-3">
                <p>Password</p>
                <input type="password" class="form-control" name="password">
            </div>
        </div>

        <!-- Fifth Row -->
        <div class="row">
            <div class="col-sm-6 mt-3">
                <p>Gender</p>
                <input type="radio" name="gender" value="M"> Male
                <input type="radio" name="gender" value="F" class="ms-3"> Female
                <input type="radio" name="gender" value="O" class="ms-3"> Other
            </div>

            <div class="col-sm-6 mt-3">
                <p>DOB</p>
                <input type="date" class="form-control" name="dob">
            </div>
        </div>

        <!-- Sixth Row -->
        <div class="row">
            <div class="col-sm-6 mt-3">
                <p>Session</p>
                <select class="form-select" name="session_name">
                    <option value="">-- Select Session --</option>
                    {% for i in ad %}
                    <option value="{{ i.session_name }}">{{ i.session_name }}</option>
                    {% endfor %}
                </select>
            </div>

            <div class="col-sm-6 mt-3">
                <p>Course</p>
                <select class="form-select" name="course_name">
                    <option value="">-- Select Course --</option>
                    {% for i in ab %}
                    <option value="{{ i.course_name }}">{{ i.course_name }}</option>
                    {% endfor %}
                </select>
            </div>
        </div>

        <!-- Submit -->
        <div class="row mb-4 mt-4">
            <div class="col-sm-12">
                <button type="submit" class="btn btn-primary">
                    Submit Application
                </button>
            </div>
        </div>

    </div>
</form>

{% endblock %}
