{% extends 'student/studentlayout.html' %}
{% block student %}

<form method="POST" action="{% url 'apply1' %}" class="mt-4">
    {% csrf_token %}

    <div class="card shadow-lg border-0 rounded-4">

        <!-- Header -->
        <div class="card-header text-white p-4 border-0" style="background:linear-gradient(90deg,#0b3f49,#18b9aa);">

            <h2 class="mb-1 fw-bold text-center">
                <i class="bi bi-person-vcard-fill"></i>
                Step 1 : Personal Information
            </h2>

            <p class="mb-0 text-center">
                Please fill all the required details carefully.
            </p>

        </div>

        <div class="card-body p-4">

            <!-- Personal Information -->
            <h5 class="fw-bold  mb-3">
                <i class="bi bi-person-circle"></i>
                Personal Details
            </h5>

            <div class="row g-4">

                <div class="col-md-4">
                    <label class="form-label">Full Name</label>
                    <input type="text" class="form-control" name="name" value="{{data.name}}">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Email Address</label>
                    <input type="email" class="form-control" name="emailaddress" value="{{data.emailaddress}}">
                </div>

                <div class="col-md-4">
                    <label class="form-label">Contact Number</label>
                    <input type="number" class="form-control" name="contact_no" value="{{data.contact_no}}">
                </div>

            </div>

            <hr class="my-4">

            <!-- Family Details -->

            <h5 class="fw-bold  mb-3">
                <i class="bi bi-people-fill"></i>
                Family Details
            </h5>

            <div class="row g-4">

                <div class="col-md-6">
                    <label class="form-label">Father's Name</label>
                    <input type="text" class="form-control" name="f_name" value="{{data.f_name}}">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Mother's Name</label>
                    <input type="text" class="form-control" name="m_name" value="{{data.m_name}}">
                </div>

            </div>

            <div class="row mt-3">

                <div class="col-md-12">
                    <label class="form-label">Address</label>
                    <textarea class="form-control" rows="4" name="address">{{data.address}}</textarea>
                </div>

            </div>

            <hr class="my-4">

            <!-- Identity Details -->

            <h5 class="fw-bold  mb-3">
                <i class="bi bi-shield-check"></i>
                Identity Details
            </h5>

            <div class="row g-4">

                <div class="col-md-6">
                    <label class="form-label">Aadhaar Number</label>
                    <input type="text" maxlength="12" class="form-control" name="aadhar_no"
                        value="{{data.aadhar_no}}">
                </div>

                <div class="col-md-6">
                    <label class="form-label">Password</label>
                    <input type="password" class="form-control" name="password" value="{{data.password}}">
                </div>

            </div>

            <div class="row mt-3">

                <div class="col-md-6">

                    <label class="form-label d-block">Gender</label>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender" value="M">
                        <label class="form-check-label">Male</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender" value="F">
                        <label class="form-check-label">Female</label>
                    </div>

                    <div class="form-check form-check-inline">
                        <input class="form-check-input" type="radio" name="gender" value="O">
                        <label class="form-check-label">Other</label>
                    </div>

                </div>

                <div class="col-md-6">
                    <label class="form-label">Date of Birth</label>
                    <input type="date" class="form-control" name="dob">
                </div>

            </div>

            <hr class="my-4">

            <!-- Admission Details -->

            <h5 class="fw-bold  mb-3">
                <i class="bi bi-book-half"></i>
                Admission Details
            </h5>

            <div class="row g-4">

                <div class="col-md-6">

                    <label class="form-label">Session</label>
                    <select class="form-select" name="session">
                        <option value="">Select Session</option>

                        {% for i in ad %}
                        <option value="{{ i.session_name }}">
                            {{ i.session_name }}
                        </option>
                        {% endfor %}
                    </select>

                </div>

                <div class="col-md-6">

                    <label class="form-label">Course</label>
                    <select class="form-select" name="course">
                        <option value="">Select Course</option>

                        {% for i in ab %}
                        <option value="{{ i.course_name }}">
                            {{ i.course_name }}
                        </option>
                        {% endfor %}
                    </select>

                </div>

            </div>

            <div class="text-end mt-5">

                <button class="btn btn-lg px-5 text-white fw-bold"
                    style="background:linear-gradient(90deg,#0b3f49,#18b9aa);">

                    <i class="bi bi-arrow-right-circle-fill"></i>
                    Save & Continue

                </button>

            </div>

        </div>

    </div>

</form>

<style>
    .card {
        border-radius: 18px;
    }

    .form-control,
    .form-select {
        height: 48px;
        border-radius: 10px;
    }

    textarea.form-control {
        height: auto;
    }

    .form-control:focus,
    .form-select:focus {
        border-color: #18b9aa;
        box-shadow: 0 0 8px rgba(24, 185, 170, .25);
    }

    .form-label {
        font-weight: 600;
        color: #0b3f49;
    }

    .card-header {
        border-radius: 18px 18px 0 0 !important;
    }

    hr {
        opacity: .15;
    }
</style>

{% endblock %}
