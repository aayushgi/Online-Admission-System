{% extends 'student/studentlayout.html' %}
{% block student %}

<form method="POST" action="{% url 'apply2' %}" enctype="multipart/form-data" class="mt-3">
    {% csrf_token %}

    <div class="card shadow border-0">

        <!-- Heading -->
        <div class="card-header text-white text-center"
             style="background:linear-gradient(90deg,#0b3f49,#18b9aa);">
            <h3 class="mb-1">
                <i class="bi bi-cloud-upload-fill"></i>
                Step 2 : Document Upload
            </h3>
            <small>Upload all required documents to complete your admission process.</small>
        </div>

        <div class="card-body">

            <!-- High School -->
            <h5 class=" fw-bold mb-3">
                <i class="bi bi-mortarboard-fill"></i>
                High School Details
            </h5>

            <div class="row g-3">

                <div class="col-md-6">
                    <label>10th Percentage</label>
                    <input type="text" class="form-control" name="hs_percentage">
                </div>

               

                <div class="col-md-6">
                    <label>10th Marksheet</label>
                    <input type="file" class="form-control" name="hs_marksheet">
                </div>

            </div>

            <hr class="my-4">

            <!-- Intermediate -->

            <h5 class=" fw-bold mb-3">
                <i class="bi bi-book-fill"></i>
                Intermediate Details
            </h5>

            <div class="row g-3">

                <div class="col-md-6">
                    <label>12th Percentage</label>
                    <input type="text" class="form-control" name="inter_percentage">
                </div>


                <div class="col-md-6">
                    <label>12th Marksheet</label>
                    <input type="file" class="form-control" name="inter_marksheet">
                </div>

            </div>

            <hr class="my-4">

            <!-- Documents -->

            <h5 class=" fw-bold mb-3">
                <i class="bi bi-folder-fill"></i>
                Required Documents
            </h5>

            <div class="row g-3">

                <div class="col-md-4">
                    <label>Aadhaar Card</label>
                    <input type="file" class="form-control" name="aadhaar_card">
                </div>

                <div class="col-md-4">
                    <label>Profile Photo</label>
                    <input type="file" class="form-control" name="profile_photo">
                </div>

                <div class="col-md-4">
                    <label>Signature</label>
                    <input type="file" class="form-control" name="signature">
                </div>

            </div>

            <hr class="my-4">

            <div class="d-grid">

                <button class="btn btn-lg text-white"
                        style="background:linear-gradient(90deg,#0b3f49,#18b9aa);">

                    <i class="bi bi-cloud-upload-fill"></i>
                    Submit Documents

                </button>

            </div>

        </div>

    </div>

</form>

<style>

.card{
    border:none;
    border-radius:15px;
    box-shadow:0 5px 15px rgba(0,0,0,.12);
}

.card-header{
    padding:20px;
}

.form-control{
    height:48px;
    border-radius:10px;
}

.form-control:focus{
    border-color:#18b9aa;
    box-shadow:0 0 6px rgba(24,185,170,.3);
}

label{
    font-weight:600;
    margin-bottom:8px;
}

</style>

{% endblock %}
