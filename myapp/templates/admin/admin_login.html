<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Login</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        body {
            background-color: rgb(20, 35, 52);
        }

        .card {
            height: 600px;
            width: 400px;
            margin-top: 65px;
            margin-left: 1000px;
        }
        .admin-card{
            float: right;
        }
        .info{
            float: right;
            margin-top: 65px;
        }
    </style>
</head>

<body>
    <div class="container-fluid">

        <div class="row">
            <div class="col-sm-1"></div>
            <div class="col-sm-5 info">
                <h1 class="text-white">Admin Control Panel</h1>
            </div>
            <div class="col-sm-5 border card rounded-4 admin-card">



                <form action="{% url 'loginsave' %}" method="POST">
                    {% csrf_token %}
                    <div class="align-items-center text-center  ">
                        <h2 class="fw-bold mt-3">Admin login
                        </h2>
                        <small class="mt-0">Enter your admin credentials to continue.</small>

                    </div>

                    <br>
                    <!-- Email input -->
                    <div data-mdb-input-init class="form-outline mb-4">
                        <label class="form-label fw-bold" for="form3Example3">Admin Username</label>
                        <input type="email" id="form3Example3" class="form-control form-control-lg"
                            placeholder="Enter a valid email address" name="username" />

                    </div>

                    <!-- Password input -->
                    <div data-mdb-input-init class="form-outline mb-3">
                        <label class="form-label fw-bold" for="form3Example4">Admin Password</label>
                        <input type="password" id="form3Example4" class="form-control form-control-lg"
                            placeholder="Enter password" name="password" />

                    </div>

                    <div class="d-flex justify-content-between align-items-center">
                        <!-- Checkbox -->
                        <div class="form-check mb-0">
                            <input class="form-check-input me-2" type="checkbox" value="" id="form2Example3" />
                            <label class="form-check-label" for="form2Example3">
                                Remember me
                            </label>
                        </div>
                        <a href="#!" class="text-body">Forgot password?</a>
                    </div>
                    <br>
                    <div class="text-center text-lg-start mt-4 pt-2">
                        <button type="submit" data-mdb-button-init data-mdb-ripple-init
                            class="btn btn-primary btn-lg w-100"
                            style="padding-left: 2.5rem; padding-right: 2.5rem; background-color: rgb(33, 54, 78);">Secured
                            Login</button>
                        <br><br>
                        <button class="btn btn-lg" type="reset"
                            style="padding-left: 2.5rem; padding-right: 2.5rem; background-color: rgb(250, 243, 227); color: rgb(122, 87, 22);">
                            Authorized administrators only.</button>

                    </div>
            </div>

        </div>






    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
