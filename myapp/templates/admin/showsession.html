{% extends 'admin/adminlayout.html '%}
{% block admin %}
<div class="container">
    <div class="row card mt-3 shadow  card-dark">
    <div class="col-sm-12 rounded">
        <h3 class="fw-bold text-center">Session List</h3>
    </div>
    </div>
    <div class="row card mt-3">
        <div class="col-sm-12 table-responsive">
            <table class="table table-hover  table-bordered align-middle shadow mt-3">
                <thead class="table-dark">
                    <tr class="table-success text-center">
                        <th>ID</th>
                        <th>Session Name</th>
                        <th>CreateDate</th>
                        <th style="width: 180px;" class="text-center">Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for i in ab %}
                    <tr>
                        <td>{{i.id}}</td>
                        <td>{{i.session_name}}</td>
                        <td>{{i.create_at}}</td>
                        <td >
                            
                            <a href="{% url 'deletesession' i.id %}" class="btn btn-danger btn-sm">Delete</a>
                        </td>
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>
{% endblock %}
