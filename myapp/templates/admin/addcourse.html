{% extends 'admin/adminlayout.html' %}

{% block admin %}




<div class="container">


    <div class="row mt-2 ">

        {% for mess in messages %}
        <div class="alert alert-success alert-dismissible fade show" role="alert">
            <strong>Success!</strong> Course added successfully.
            <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
        </div>
        {% endfor %}
        <div class="card shadow border-0 rounded-4 mb-3 mt-3" style="background-color: #DCFCE7;">
            <div class="card-body">
                <h3 class="fw-bolder">Add Course</h3>
                <small class="fw-bold">Create new course with session, duration and fees.</small>
            </div>

        </div>
    </div>
    <br>


    <form method="post">
        {% csrf_token %}

        <div class="card p-3 shadow border-0 rounded-4">
            <h3 class="fw-bold mx-2 mb-3">Add New Course</h3>

            <div class="row ">

                <div class="col-sm-6">
                    <h6 class="fw-bold">Sellect Session</h6>
                    

                            <input type="text" name="session_name" class="form-control form-control-lg"
                                placeholder="Example: 2025-26" required>
                </div>
                <div class="col-sm-6">
                    <h6 class="fw-bold">Course Name</h6>
                    <input type="text" name="course_name" class="form-control">

                </div>

                <div class="col-sm-6 mt-3">
                    <h6 class="fw-bold">Duration</h6>
                    <input type="text" name="duration" placeholder="Example:6 months" class="form-control">

                </div>

                <div class="col-sm-6 mt-3">
                    <h6 class="fw-bold">Fees</h6>
                    <input type="number" name="fees" class="form-control" required>

                </div>

                <div class="col-sm-12 mt-3">
                    <input type="submit" value="submit" class="btn btn-success">
                    <input type="reset" class="btn btn-secondary">
                </div>
            </div>
        </div>
    </form>
</div>



{% endblock %}
