{% extends 'admin/adminlayout.html '%}
{% block admin %}



<div class="container">
    
    <div class="row  card mt-3 shadow  card-dark">
    <div class="col-sm-12">
        <h3 class="fw-bold text-center" >Course List</h3>
    </div>
    </div>
    <div class="row card mt-3">
        <div class="col-sm-12">
            <table  class="table table-hover  table-bordered align-middle shadow mt-3">
                <thead class="table-dark">
                    <tr class="table-success text-center">
                        <th>Id</th>
                        <th>Session </th>
                        <th>Course Name</th>
                        <th>Duration</th>
                        <th>Fees</th>
                        <th>CreateDate</th>
                        <th style="width: 180px;" class="text-center">Action</th>
                    </tr>
                </thead>
                <tbody>
                    {% for i in ab %}
                    <tr>
                        <td>{{i.id}}</td>
                        <td>{{i.session_name}}</td>
                        <td>{{i.course_name}}</td>
                        <td>{{i.duration}}</td>
                        <td>{{i.fees}}</td>
                        <td>{{i.create_at}}</td>
                        <td>
                            <a href="{% url 'editcourse' i.id %}" class="btn btn-success btn-sm me-4">Edit</a>
                            <a href="{% url 'deletecourse' i.id %}" class="btn btn-danger btn-sm">Delete</a>
                        </td>
                        
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

{% endblock %}
