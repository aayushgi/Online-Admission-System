{% extends 'admin/adminlayout.html '%}
{% block admin %}



<div class="container">
    <div class="row">
    <div class="col-sm-12">
        <h3>Show Course</h3>
    </div>
    </div>
    <div class="row">
        <div class="col-sm-12">
            <table class="table table-bordered">
                <thead>
                    <tr class="table-success text-center">
                        <th>Id</th>
                        <th>Session </th>
                        <th>Course Name</th>
                        <th>Duration</th>
                        <th>Fees</th>
                    </tr>
                </thead>
                <tbody>
                    {% for i in ab %}
                    <tr>
                        <td>{{i.id}}</td>
                        <td>{{i.session_name}}</td>
                        <td>{{i.course_name}}</td>
                        <td>{{i.duration}}</td>
                        <td>{{i.fees}}</td>
                        <td>{{i.create_at}}</td>
                        
                    </tr>
                    {% endfor %}
                </tbody>
            </table>
        </div>
    </div>
</div>

{% endblock %}
