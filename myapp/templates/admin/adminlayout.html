<!doctype html>
<html lang="en">

<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Admin Dashboard | Biotech Park</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet"
        integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <link rel="stylesheet"
        href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap-icons/1.13.1/font/bootstrap-icons.min.css"
        integrity="sha512-t7Few9xlddEmgd3oKZQahkNI4dS6l80+eGEzFQiqtyVYdvcSG2D3Iub77R20BdotfRPA9caaRkg1tyaJiPmO0g=="
        crossorigin="anonymous" referrerpolicy="no-referrer" />
    <style>
        .h {
            min-height: 100vh;

        }

        .h:first-child {
            background: linear-gradient(180deg,
                    #0b3f49 0%,
                    #10666a 50%,
                    #18b9aa 100%);
            box-shadow: 5px 0 10px rgba(0, 0, 0, .3);
        }

        .h h4 {
            color: white;
            text-align: center;
            padding: 20px 0;
            margin: 0;
            font-size: 24px;
        }

        .h p {
            padding: 10px;
            border-radius: 8px;
        }

        .h p:hover {
            background: rgba(255, 255, 255, 0.15);
        }

        .h p:hover {
            background-color: rgb(142, 202, 60);
        }

        a {
            text-decoration: none;
            color: black;
        }

        #heading {
            background: rgb(240, 231, 111);
            padding: 8px;
            text-align: center;
            font-weight: bold;
            border-radius: 6px;
            margin: 15px;
        }

        .menu {
            padding: 12px;
            border-radius: 8px;
            margin: 8px 15px;
            transition: 0.3s;
        }

        .menu a {
            color: black;
            text-decoration: none;
            font-weight: bold;
            display: block;
        }

        .menu:hover {
            background: #22c55e;
            transform: translateX(5px);
        }

        .h6-menu {
            color: #BBF7D0;
            margin-top: 20px;
        }
    </style>
</head>

<body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-sm-2 h">
                <h4><i class="bi bi-leaf-fill"></i> Biotech Park</h4>
                <hr class="text-white mt-0">

                <h6 class="h6-menu">MAIN MENU</h6>
                <p class="text-white fw-bold text-center"><a href="{% url 'dashboard' %}" style="margin-top: 20px;">🏠
                        Admin Dashboard</a>
                </p>
                <h6 class="h6-menu">MANAGE SESSION</h6>
                <p id="heading">Manage Session</p>
                <p class=" menu"><a href="{% url 'showsession' %}">📅 Show session</a></p>
                <p class="menu"><a href="{% url 'addsession' %}">➕ Add session</a></p>
                <h6 class="h6-menu">MANAGE COURSES</h6>
                <p id="heading">Manage Courses</p>
                <p class=" menu"><a href="{% url 'addcourse' %}">📚 Add Course</a></p>
                <p class=" menu"><a href="{% url 'showcourse' %}">📖 Show Course</a></p>
                  <h6 class="h6-menu">MANAGE SUDENT</h6>
                  <p id="heading">Manage Student</p>
                
                <p class="menu"><a href="{% url 'addstudent' %}">🧑‍🎓 Add Student</a></p>
                <p class="menu" style="border: 1px solid gray; background-color: rgba(211, 211, 211, 0.341);"><a
                        href="{% url 'logout' %}"><i class="bi bi-box-arrow-left"></i> Logout</a></p>

            </div>
            <div class="col-sm-10  ">
                {% block admin %}
                {% endblock %}
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
        integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
        crossorigin="anonymous"></script>
</body>

</html>
