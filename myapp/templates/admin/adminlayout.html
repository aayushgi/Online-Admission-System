<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Bootstrap demo</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB" crossorigin="anonymous">
    <style>
        .h{
            height: 100vh;

        }
        .h:first-child{
            background-color: green;
        }
        .h h4{
            color: white;
            padding-top: 20px;
            padding-left: 20px;
        }
        .h p {
            background-color: greenyellow;
            padding: 5px;
            border-radius: 5px;
        }
        a{
            text-decoration: none;
            color: black;
        }
        
    </style>
  </head>
  <body>
    <div class="container-fluid">
        <div class="row">
            <div class="col-sm-2 h">
                <h4>Admin login</h4>
                <p class="text-white fw-bold text-center"><a href="" style="margin-top: 20px;">Dashboard</a></p>
                <p class="text-white fw-bold text-center"><a href="{% url 'showsession' %}">Show session</a></p>
                <p class="text-white fw-bold text-center"><a href="{% url 'addsession' %}">Add session</a></p>
                <p class="text-white fw-bold text-center"><a href="{% url 'addcourse' %}">Add Course</a></p>
                  <p class="text-white fw-bold text-center"><a href="{% url 'showcourse' %}">Show Course</a></p>
                
            </div>
            <div class="col-sm-10 h ">
                {% block admin %}
                {% endblock %}
            </div>
        </div>
    </div>
    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js" integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI" crossorigin="anonymous"></script>
  </body>
</html>
