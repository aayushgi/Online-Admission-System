{% extends 'admin/adminlayout.html' %}
{% block admin %}

<div class="d-flex flex-column" style="min-height: 100%;">

    <div class="container mt-4">

        <!-- Heading -->
        <div class="row mb-4">
            <div class="col-12">
                <div class="card shadow border-0">
                    <div class="card-header bg-success text-white text-center py-3">
                        <h3 class="mb-0 fw-bold">
                            Add Student
                        </h3>
                    </div>
                </div>
            </div>
        </div>

        <!-- Form -->
        <div class="row">
            <div class="col-lg-10 mx-auto">

                <form method="POST" class="card shadow-lg border-0">
                    {% csrf_token %}

                    <div class="card-body p-4">

                        <div class="row">

                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">
                                    Enter Name
                                </label>
                                <input type="text"
                                       class="form-control"
                                       name="name"
                                       placeholder="Enter Full Name">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">
                                    Enter Email
                                </label>
                                <input type="email"
                                       class="form-control"
                                       name="emailaddress"
                                       placeholder="Enter Email Address">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">
                                    Mobile Number
                                </label>
                                <input type="number"
                                       class="form-control"
                                       name="contact_no"
                                       placeholder="Enter Mobile Number">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">
                                    Password
                                </label>
                                <input type="password"
                                       class="form-control"
                                       name="password"
                                       placeholder="Enter Password">
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold d-block">
                                    Gender
                                </label>

                                <div class="form-check form-check-inline">
                                    <input class="form-check-input"
                                           type="radio"
                                           name="gender"
                                           value="M">

                                    <label class="form-check-label">
                                        Male
                                    </label>
                                </div>

                                <div class="form-check form-check-inline">
                                    <input class="form-check-input"
                                           type="radio"
                                           name="gender"
                                           value="F">

                                    <label class="form-check-label">
                                        Female
                                    </label>
                                </div>

                                <div class="form-check form-check-inline">
                                    <input class="form-check-input"
                                           type="radio"
                                           name="gender"
                                           value="O">

                                    <label class="form-check-label">
                                        Other
                                    </label>
                                </div>
                            </div>

                            <div class="col-md-6 mb-3">
                                <label class="form-label fw-semibold">
                                    Date of Birth
                                </label>

                                <input type="date"
                                       class="form-control"
                                       name="dob">
                            </div>

                        </div>

                        <div class="text-center mt-3">
                            <button type="submit"
                                    class="btn btn-success px-5 py-2 fw-bold">
                                Submit
                            </button>
                        </div>

                    </div>

                </form>

            </div>
        </div>

    </div>

    <footer class="text-center py-3 mt-auto">
        © 2026 Online Admission System | Design and Developed by Ayush Saxena. All Rights Reserved.
    </footer>

</div>

{% endblock %}
