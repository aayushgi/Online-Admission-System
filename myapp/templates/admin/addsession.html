{% extends 'admin/adminlayout.html' %}

{% block admin %}

<body style="background-color: rgb(226, 239, 238);">
    


<div class="container mt-5">

    {% for mess in messages %}
            <div class="alert alert-success alert-dismissible fade show" role="alert">
                <strong>Success!</strong> Session added successfully.
                <button type="button" class="btn-close" data-bs-dismiss="alert"></button>
            </div>
            {% endfor %}

    <div class="card shadow border-0 rounded-4 mb-3" style="width: 1000px; margin-left: 115px; background-color: #DCFCE7;">
        <div class="card-body">
        <h3 class="fw-bolder">Add Session</h3>
         <small class="fw-bold">Create admission session from this page.</small>
        </div>
        
    </div>
    <br>
    <div class="row justify-content-center">

        <div class="col-md-10">

            
            <div class="card shadow-lg border-0 rounded-4">

                <div class="card-header   rounded-top-4" style="background-color: #16A34A;;">
                    <h3 class="mb-0 fw-bold">📅 Add New Session</h3>
                </div>

                <div class="card-body p-4">

                    <form method="post">
                        {% csrf_token %}

                        <div class="mb-3">
                            <label class="form-label fw-bold" style="font-size: 20px;">
                                Session Name
                            </label>

                            <input type="text" name="session_name" class="form-control form-control-lg"
                                placeholder="Example: 2025-26" required>
                        </div>

                        <div class=" mt-4">
                            <button type="submit" class="btn btn-success px-3">
                                Save Session
                            </button>
                            <button type="reset" class="btn btn-secondary ">Clear</button>


                        </div>

                    </form>

                </div>

            </div>

        </div>

    </div>
</div>
</body>

{% endblock %}
